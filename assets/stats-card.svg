<svg xmlns="http://www.w3.org/2000/svg" width="850" height="180" viewBox="0 0 850 180">
  <defs>
    <style>
      .metric-icon { animation: count-glow 4s ease-in-out infinite; }
      @keyframes count-glow {
        0%, 100% { fill-opacity: 0.7; }
        50% { fill-opacity: 1; }
      }
      @keyframes border-pulse {
        0%, 100% { stroke-opacity: 0.4; }
        50% { stroke-opacity: 0.9; }
      }
    </style>
    <filter id="num-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="icon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect x="1" y="1" width="848" height="178" rx="11" fill="url(#cardBg)"/>
  <!-- Animated border -->
  <rect x="1" y="1" width="848" height="178" rx="11" fill="none" stroke="url(#borderGrad)" stroke-width="1.2">
    <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Section label -->
  <text x="36" y="40" font-family="'Space Mono', monospace" font-size="10" fill="#a855f7" letter-spacing="4" font-weight="700">MISSION TELEMETRY</text>
  <line x1="36" y1="48" x2="814" y2="48" stroke="#1e293b" stroke-width="0.8"/>

  <!-- Metric 1: Commits -->
  <g transform="translate(120, 90)">
    <!-- Icon: commit symbol -->
    <g filter="url(#icon-glow)" class="metric-icon">
      <circle r="7" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
      <circle r="2.5" fill="#38bdf8"/>
    </g>
    <text x="0" y="35" text-anchor="middle" font-family="'Space Mono', monospace" font-size="26" font-weight="700" fill="#e2e8f0" letter-spacing="-1">132</text>
    <text x="0" y="52" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#64748b" letter-spacing="1">Contributions</text>
  </g>

  <!-- Divider -->
  <line x1="240" y1="65" x2="240" y2="155" stroke="#1e293b" stroke-width="0.8"/>

  <!-- Metric 2: Stars -->
  <g transform="translate(340, 90)">
    <g filter="url(#icon-glow)" class="metric-icon">
      <polygon points="0,-8 2,-3 7.6,-3 3.1,1.2 4.7,7 0,3.5 -4.7,7 -3.1,1.2 -7.6,-3 -2,-3" fill="#f59e0b"/>
    </g>
    <text x="0" y="35" text-anchor="middle" font-family="'Space Mono', monospace" font-size="26" font-weight="700" fill="#e2e8f0" letter-spacing="-1">11</text>
    <text x="0" y="52" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#64748b" letter-spacing="1">Stars</text>
  </g>

  <!-- Divider -->
  <line x1="460" y1="65" x2="460" y2="155" stroke="#1e293b" stroke-width="0.8"/>

  <!-- Metric 3: Repos -->
  <g transform="translate(560, 90)">
    <g filter="url(#icon-glow)" class="metric-icon">
      <rect x="-7" y="-8" width="14" height="16" rx="2" fill="none" stroke="#a855f7" stroke-width="1.5"/>
      <line x1="-4" y1="-4" x2="4" y2="-4" stroke="#a855f7" stroke-width="1.2"/>
      <line x1="-4" y1="0" x2="4" y2="0" stroke="#a855f7" stroke-width="1.2"/>
      <line x1="-4" y1="4" x2="1" y2="4" stroke="#a855f7" stroke-width="1.2"/>
    </g>
    <text x="0" y="35" text-anchor="middle" font-family="'Space Mono', monospace" font-size="26" font-weight="700" fill="#e2e8f0" letter-spacing="-1">8</text>
    <text x="0" y="52" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#64748b" letter-spacing="1">Repos</text>
  </g>

  <!-- Divider -->
  <line x1="680" y1="65" x2="680" y2="155" stroke="#1e293b" stroke-width="0.8"/>

  <!-- Metric 4: Following -->
  <g transform="translate(765, 90)">
    <g filter="url(#icon-glow)" class="metric-icon">
      <circle cx="-3" cy="-6" r="4" fill="none" stroke="#34d399" stroke-width="1.5"/>
      <path d="M-10,4 Q-6,-1 -3,0 Q0,-1 4,4" fill="none" stroke="#34d399" stroke-width="1.5"/>
      <line x1="6" y1="-8" x2="10" y2="-8" stroke="#34d399" stroke-width="1.5"/>
      <line x1="8" y1="-10" x2="8" y2="-6" stroke="#34d399" stroke-width="1.5"/>
    </g>
    <text x="0" y="35" text-anchor="middle" font-family="'Space Mono', monospace" font-size="26" font-weight="700" fill="#e2e8f0" letter-spacing="-1">5</text>
    <text x="0" y="52" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#64748b" letter-spacing="1">Following</text>
  </g>
</svg>
